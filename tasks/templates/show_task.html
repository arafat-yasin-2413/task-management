<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Show Task</title>
	</head>
	<body>
		
		<ol>
			{% for project in projects %}
			<li>
				<p>{{project.name}}</p>
                <p>{{project.num_task}}</p>
				
			</li>
			{% endfor %}
		</ol>
		

		<p>
            {% comment %} {{task_count.num_task}} {% endcomment %}
            {{task_count}}
        </p>
	</body>
</html>

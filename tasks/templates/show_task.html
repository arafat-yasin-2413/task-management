<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Task</title>
</head>
<body>
    <ul>
        {% comment %} {% for task in tasks %}
            <li>
                <p>{{task.title}}</p>
                <span>{{task.status}}</span>
            </li>
        {% endfor %}  {% endcomment %}
    </ul>

    <div>
        {{tasks}}
    </div>
    
</body>
</html>
